<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Greenmart</title>
    <link rel="stylesheet" href="./src/css/signin.css" />
  </head>
  <body>
    <div class="green-section">
      <h1>Join Our Community</h1>
      <p>
        Create your account today and unlock exclusive access to premium
        products, special offers, and personalized shopping experiences.
      </p>
      <div class="benefis">
        <div class="benefit">
          <div class="icon">
            <img src="./assets/icons/featured_seasonal.svg" alt="" />
          </div>
          <p><strong>Exclusive Rewards</strong></p>
        </div>
        <div class="benefit">
          <div class="icon">
            <img src="./assets/icons/notifications.svg" alt="" />
          </div>
          <p><strong>Early Access</strong></p>
        </div>
        <div class="benefit">
          <div class="icon">
            <img src="./assets/icons/favorite.svg" alt="" />
          </div>
          <p><strong>Personalized Experience</strong></p>
        </div>
      </div>
    </div>
    <div class="white-section">
      <div class="shop-logo">
        <img src="assets/images/shopmart_logo.png" alt="" />
      </div>
      <h2>Create Account</h2>
      <p class="heading">Join us and start your shopping journey</p>

      <form class="create-account-form">
        <label for="fullName" class="form-component">Full Name</label>
        <div class="input-icon">
          <input
            type="text"
            name="fullName"
            id="fullName"
            class="form-component user-detail"
            required
          />
        </div>

        <label for="email" class="form-component">Email Address</label>
        <input
          type="email"
          name="email"
          id="email"
          class="form-component user-detail email-input"
          required
        />

        <label for="phoneNumber" class="form-component">Phone Number</label>
        <input
          type="text"
          name="phoneNumber"
          id="phoneNumber"
          class="form-component user-detail phone-number-input"
          required
        />

        <label for="address" class="form-component">Delivery Address</label>
        <input
          type="text"
          name="address"
          id="address"
          class="form-component user-detail"
          required
        />

        <label for="password" class="form-component">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          class="form-component user-detail password"
          required
        />

        <label for="confirm-password" class="form-component">Password</label>
        <input
          type="password"
          name="confirmPassword"
          id="confirm-password"
          class="form-component user-detail confirm-password"
          required
        />

        <button type="submit">Create Account</button>
        <p class="create-account">
          Already have an account? <a href="./signin.html">Sign in</a>
        </p>
      </form>
    </div>

    <script src="./src/js/profile.js"></script>
  </body>
</html>
